
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME:taskPulse}
    username: ${DB_USERNAME:taskpulse_user}
    password: ${DB_PASSWORD:taskPulse}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true